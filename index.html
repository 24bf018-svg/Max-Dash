<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Max.tetris</title>
<style>
  :root{
    --bg:#070a14;
    --panel:rgba(18,24,44,.62);
    --line:rgba(120,150,220,.14);
    --grid:rgba(120,150,220,.06);
    --txt:#dfe7ff;
    --muted:#7a85ad;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(1100px 700px at 18% -10%, rgba(96,165,250,.16), transparent 60%),
      radial-gradient(900px 600px at 110% 120%, rgba(192,132,252,.16), transparent 55%),
      var(--bg);
    color:var(--txt);
    font-family:"Helvetica Neue",Arial,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    min-height:100%;
    display:flex; align-items:center; justify-content:center;
    padding:18px; overflow:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  .wrap{
    zoom:.8;
    display:flex; gap:22px; align-items:flex-start;
    filter:drop-shadow(0 30px 60px rgba(0,0,0,.55));
  }
  .leftcol{ display:flex; flex-direction:column; align-items:center; gap:14px; }
  .leftcol .keys-card{ width:150px; }
  .title{
    font-weight:800; letter-spacing:.34em; font-size:13px;
    color:var(--muted);
    writing-mode:vertical-rl; text-orientation:mixed;
    display:flex; align-items:center; padding:6px 0 2px;
  }
  .title b{ color:#9fb4ff; }
  .stage{ position:relative; }
  canvas{ display:block; border-radius:10px; }
  #board{
    background:
      linear-gradient(var(--grid) 1px,transparent 1px) 0 0/100% calc(100%/20),
      linear-gradient(90deg,var(--grid) 1px,transparent 1px) 0 0/calc(100%/10) 100%,
      rgba(8,12,26,.72);
    border:1px solid var(--line);
    box-shadow:inset 0 0 60px rgba(0,0,0,.6), 0 0 0 1px rgba(120,150,220,.05);
  }
  .side{ display:flex; flex-direction:column; gap:14px; width:150px; }
  .card{
    background:var(--panel); border:1px solid var(--line);
    border-radius:12px; padding:12px 14px; backdrop-filter:blur(6px);
  }
  .card h3{
    font-size:10px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--muted); font-weight:700; margin-bottom:9px;
  }
  .stat{ font-size:26px; font-weight:800; letter-spacing:.02em; line-height:1; }
  .stat.small{ font-size:19px; }
  #linesGoal{ font-size:13px; color:var(--muted); font-weight:600; }
  .mini{ display:block; margin:0 auto; }
  .keys{ font-size:11px; line-height:1.85; color:var(--muted); }
  .keys b{ color:var(--txt); font-weight:700; }
  .keys kbd{
    display:inline-block; min-width:18px; text-align:center;
    background:rgba(120,150,220,.12); border:1px solid var(--line);
    border-radius:4px; padding:1px 5px; font-family:inherit; font-size:10px; color:#bcc8ef;
  }
  .overlay{
    position:absolute; inset:0; border-radius:10px;
    background:rgba(7,10,20,.86); backdrop-filter:blur(4px);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; text-align:center; padding:22px 18px;
    opacity:0; pointer-events:none; transition:opacity .25s;
    overflow:auto;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }
  .overlay .big{ font-size:28px; font-weight:800; letter-spacing:.06em; }
  .overlay .menuTitle{ font-size:22px; font-weight:800; letter-spacing:.18em; color:#9fb4ff; }
  .overlay .sub{ font-size:13px; color:var(--muted); line-height:1.5; }
  .overlay .sub b{ color:var(--txt); }
  .row{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .btn{
    border:1px solid rgba(120,150,220,.35); background:rgba(120,150,220,.1);
    color:var(--txt); font:inherit; font-weight:700; font-size:13px; letter-spacing:.08em;
    padding:10px 22px; border-radius:9px; cursor:pointer; transition:background .15s, transform .1s;
  }
  .btn:hover{ background:rgba(120,150,220,.22); }
  .btn:active{ transform:translateY(1px); }
  .ghostbtn{ background:transparent; }
  .modes{ display:flex; flex-direction:column; gap:8px; width:236px; }
  .modes button{
    border:1px solid var(--line); background:rgba(120,150,220,.07);
    color:var(--txt); font:inherit; cursor:pointer; text-align:left;
    border-radius:10px; padding:10px 13px; display:flex; flex-direction:column; gap:2px;
    transition:background .15s, border-color .15s;
  }
  .modes button:hover{ background:rgba(120,150,220,.18); border-color:rgba(120,150,220,.4); }
  .modes .mn{ font-weight:700; font-size:14px; letter-spacing:.05em; }
  .modes .md{ font-size:11px; color:var(--muted); }
  .levelgrid{ display:grid; grid-template-columns:repeat(5,1fr); gap:6px; width:236px; }
  .levelgrid button{
    border:1px solid var(--line); background:rgba(120,150,220,.07); color:var(--txt);
    font:inherit; font-weight:700; font-size:13px; cursor:pointer; border-radius:8px; padding:9px 0;
    transition:background .15s;
  }
  .levelgrid button:hover{ background:rgba(120,150,220,.22); }
  .rankentry{ display:flex; gap:8px; align-items:center; }
  .nameinput{
    background:rgba(120,150,220,.1); border:1px solid var(--line); color:var(--txt);
    font:inherit; font-size:14px; padding:9px 12px; border-radius:9px; width:130px; text-align:center;
  }
  .nameinput::placeholder{ color:var(--muted); }
  .ranktabs{ display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
  .ranktab{
    border:1px solid var(--line); background:rgba(120,150,220,.07); color:var(--muted);
    font:inherit; font-size:11px; font-weight:700; padding:6px 10px; border-radius:7px; cursor:pointer;
  }
  .ranktab.active{ background:rgba(120,150,220,.25); color:var(--txt); border-color:rgba(120,150,220,.45); }
  .ranklist{ width:240px; display:flex; flex-direction:column; gap:4px; max-height:260px; overflow:auto; }
  .rankrow{
    display:flex; align-items:center; gap:10px; padding:7px 11px;
    background:rgba(120,150,220,.07); border:1px solid var(--line); border-radius:8px; font-size:13px;
  }
  .rankrow .rk{ width:20px; font-weight:800; color:#9fb4ff; text-align:right; }
  .rankrow .rnm{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .rankrow .rv{ font-weight:700; }
  .touch{ display:none; }
  @media (max-width:680px){
    .wrap{ flex-direction:column; align-items:center; gap:12px; }
    .title{ writing-mode:horizontal-tb; }
    .side{ flex-direction:row; width:auto; flex-wrap:wrap; justify-content:center; }
    .keys-card{ display:none; }
    .touch{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; width:min(94vw,340px); }
    .touch button{
      border:1px solid var(--line); background:var(--panel); color:var(--txt);
      border-radius:11px; padding:14px 0; font-size:18px; font-weight:700; cursor:pointer; backdrop-filter:blur(6px);
    }
    .touch button:active{ background:rgba(120,150,220,.22); }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="leftcol">
      <div class="title">Max<b>.tetris</b></div>
      <div class="card keys-card">
        <h3>Keys</h3>
        <div class="keys">
          <kbd>&larr;</kbd><kbd>&rarr;</kbd> <b>移動</b><br>
          <kbd>&darr;</kbd> <b>ソフト落下</b><br>
          <kbd>&uarr;</kbd><kbd>X</kbd> <b>右回転</b> / <kbd>Z</kbd> <b>左回転</b><br>
          <kbd>Space</kbd> <b>ハード落下</b><br>
          <kbd>C</kbd> <b>ホールド</b> / <kbd>P</kbd> <b>一時停止</b>
        </div>
      </div>
    </div>

    <div class="stage">
      <canvas id="board" width="300" height="600"></canvas>
      <div class="overlay show" id="overlay"></div>
    </div>

    <div class="side">
      <div class="card"><h3>Next</h3><canvas id="next" class="mini" width="118" height="74"></canvas></div>
      <div class="card"><h3>Hold</h3><canvas id="hold" class="mini" width="118" height="74"></canvas></div>
      <div class="card"><h3 id="modeLabel">Mode</h3><div class="stat small" id="modeName">—</div></div>
      <div class="card"><h3 id="timeLabel">Time</h3><div class="stat small" id="time">0:00</div></div>
      <div class="card"><h3>Score</h3><div class="stat" id="score">0</div></div>
      <div class="card" style="display:flex;gap:18px;">
        <div><h3>Lines</h3><div class="stat small"><span id="lines">0</span><span id="linesGoal"></span></div></div>
        <div><h3>Level</h3><div class="stat small" id="level">1</div></div>
      </div>
    </div>
  </div>

  <div class="touch" id="touch">
    <button data-act="left">&larr;</button>
    <button data-act="rotate">&#10227;</button>
    <button data-act="right">&rarr;</button>
    <button data-act="hold">H</button>
    <button data-act="down">&darr;</button>
    <button data-act="drop" style="grid-column:span 2;">&#10515; DROP</button>
    <button data-act="pause">&#10074;&#10074;</button>
  </div>

<script>
const COLS=10, ROWS=20, CELL=30, ULTRA_MS=180000;
const board=document.getElementById('board'), bctx=board.getContext('2d');
const nextC=document.getElementById('next'), nctx=nextC.getContext('2d');
const holdC=document.getElementById('hold'), hctx=holdC.getContext('2d');
const overlay=document.getElementById('overlay');

const COLORS={I:'#22d3ee',O:'#fde047',T:'#c084fc',S:'#4ade80',Z:'#fb7185',J:'#60a5fa',L:'#fb923c'};
const SHAPES={
  I:[[0,1],[1,1],[2,1],[3,1]], O:[[1,0],[2,0],[1,1],[2,1]], T:[[1,0],[0,1],[1,1],[2,1]],
  S:[[1,0],[2,0],[0,1],[1,1]], Z:[[0,0],[1,0],[1,1],[2,1]], J:[[0,0],[0,1],[1,1],[2,1]], L:[[2,0],[0,1],[1,1],[2,1]],
};
const MODES={
  normal:{name:'ノーマル'}, marathon:{name:'マラソン'}, sprint:{name:'スプリント'},
  ultra:{name:'ウルトラ'}, practice:{name:'練習'},
};

let grid, cur, nextPiece, holdPiece, canHold, queue=[];
let score, lines, level, dropTimer, dropInterval, last, gameTime;
let mode='normal', startLevel=1, lastMode='normal', lastStartLevel=1;
let state='ready', rafId=null;

function speedFor(lv){ return Math.max(30, Math.round(800*Math.pow(0.85, lv-1))); }
function emptyGrid(){ return Array.from({length:ROWS},()=>Array(COLS).fill(null)); }
function bagShuffle(){ const t=['I','O','T','S','Z','J','L'];
  for(let i=t.length-1;i>0;i--){ const j=Math.random()*(i+1)|0; [t[i],t[j]]=[t[j],t[i]]; } return t; }
function nextType(){ if(queue.length<2) queue.push(...bagShuffle()); return queue.shift(); }
function spawn(type){ return { type, cells:SHAPES[type].map(([x,y])=>({x:x+3,y})) }; }

function collide(cells){ return cells.some(c=>c.x<0||c.x>=COLS||c.y>=ROWS||(c.y>=0&&grid[c.y][c.x])); }
function rotate(p,dir){
  if(p.type==='O') return p.cells.map(c=>({...c}));
  const xs=p.cells.map(c=>c.x), ys=p.cells.map(c=>c.y);
  const cx=Math.round((Math.min(...xs)+Math.max(...xs))/2), cy=Math.round((Math.min(...ys)+Math.max(...ys))/2);
  return p.cells.map(c=>{ const dx=c.x-cx,dy=c.y-cy; return dir>0?{x:cx-dy,y:cy+dx}:{x:cx+dy,y:cy-dx}; });
}
function tryRotate(dir){
  const r=rotate(cur,dir);
  for(const k of [0,-1,1,-2,2]){ const s=r.map(c=>({x:c.x+k,y:c.y})); if(!collide(s)){ cur.cells=s; return; } }
}
function move(dx){ const s=cur.cells.map(c=>({x:c.x+dx,y:c.y})); if(!collide(s)){ cur.cells=s; return true; } return false; }
function softDrop(){ const s=cur.cells.map(c=>({x:c.x,y:c.y+1})); if(!collide(s)){ cur.cells=s; return true; } lock(); return false; }
function hardDrop(){ let d=0; while(true){ const s=cur.cells.map(c=>({x:c.x,y:c.y+1})); if(collide(s))break; cur.cells=s; d++; } score+=d*2; lock(); }
function ghostCells(){ let c=cur.cells.map(x=>({...x})); while(true){ const s=c.map(x=>({x:x.x,y:x.y+1})); if(collide(s))break; c=s; } return c; }

function lock(){
  for(const c of cur.cells){ if(c.y<0){ gameOver(); return; } grid[c.y][c.x]=cur.type; }
  clearLines();
  if(state!=='playing') return;
  canHold=true; cur=nextPiece; nextPiece=spawn(nextType());
  if(collide(cur.cells)){ gameOver(); return; }
  drawNext(); drawHold();
}
function clearLines(){
  let cleared=0;
  for(let y=ROWS-1;y>=0;y--){ if(grid[y].every(v=>v)){ grid.splice(y,1); grid.unshift(Array(COLS).fill(null)); cleared++; y++; } }
  if(!cleared) return;
  score+=[0,100,300,500,800][cleared]*level;
  lines+=cleared;
  if(mode!=='practice'){
    let nl=Math.floor(lines/10)+1;
    if(mode==='marathon') nl=Math.min(nl,20);
    if(nl!==level){ level=nl; dropInterval=speedFor(level); }
  }
  updateHud();
  if(mode==='sprint' && lines>=40) return finish('CLEAR', '40 LINES &nbsp;<b>'+fmt(gameTime,true)+'</b>');
  if(mode==='marathon' && lines>=200) return finish('CLEAR', '<b>'+fmt(gameTime,false)+'</b> &nbsp;&middot;&nbsp; '+score.toLocaleString()+' pts');
}
function doHold(){
  if(!canHold) return;
  const t=cur.type;
  if(holdPiece){ cur=spawn(holdPiece); } else { cur=nextPiece; nextPiece=spawn(nextType()); drawNext(); }
  holdPiece=t; canHold=false; drawHold();
}

// rendering
function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function blk(ctx,x,y,size,color,o={}){
  const px=x*size, py=y*size;
  ctx.save();
  if(o.ghost){ ctx.globalAlpha=.22; ctx.fillStyle=color; ctx.fillRect(px+2,py+2,size-4,size-4);
    ctx.globalAlpha=.6; ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.strokeRect(px+2.5,py+2.5,size-5,size-5); ctx.restore(); return; }
  ctx.shadowColor=color; ctx.shadowBlur=o.mini?6:14; ctx.fillStyle=color;
  roundRect(ctx,px+1.5,py+1.5,size-3,size-3,4); ctx.fill();
  ctx.shadowBlur=0;
  const g=ctx.createLinearGradient(px,py,px,py+size);
  g.addColorStop(0,'rgba(255,255,255,.38)'); g.addColorStop(.45,'rgba(255,255,255,.05)'); g.addColorStop(1,'rgba(0,0,0,.28)');
  ctx.fillStyle=g; roundRect(ctx,px+1.5,py+1.5,size-3,size-3,4); ctx.fill();
  ctx.restore();
}
function draw(){
  bctx.clearRect(0,0,board.width,board.height);
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++) if(grid[y][x]) blk(bctx,x,y,CELL,COLORS[grid[y][x]]);
  if(state==='playing'||state==='paused'){
    for(const c of ghostCells()) if(c.y>=0) blk(bctx,c.x,c.y,CELL,COLORS[cur.type],{ghost:true});
    for(const c of cur.cells) if(c.y>=0) blk(bctx,c.x,c.y,CELL,COLORS[cur.type]);
  }
}
function drawMini(ctx,cv,type){
  ctx.clearRect(0,0,cv.width,cv.height); if(!type) return;
  const s=18, cells=SHAPES[type], xs=cells.map(c=>c[0]), ys=cells.map(c=>c[1]);
  const w=Math.max(...xs)-Math.min(...xs)+1, h=Math.max(...ys)-Math.min(...ys)+1;
  const ox=(cv.width-w*s)/2-Math.min(...xs)*s, oy=(cv.height-h*s)/2-Math.min(...ys)*s;
  ctx.save(); ctx.translate(ox,oy);
  for(const [x,y] of cells) blk(ctx,x,y,s,COLORS[type],{mini:true});
  ctx.restore();
}
function drawNext(){ drawMini(nctx,nextC,nextPiece?nextPiece.type:null); }
function drawHold(){ drawMini(hctx,holdC,holdPiece); }

function fmt(ms,centi){
  const t=Math.max(0,ms), m=Math.floor(t/60000), s=Math.floor(t%60000/1000), cs=Math.floor(t%1000/10);
  const ss=String(s).padStart(2,'0');
  return centi ? m+':'+ss+'.'+String(cs).padStart(2,'0') : m+':'+ss;
}
function updateHud(){
  document.getElementById('score').textContent=score.toLocaleString();
  document.getElementById('lines').textContent=lines;
  document.getElementById('level').textContent=level;
}
function updateTime(){
  document.getElementById('time').textContent = mode==='ultra' ? fmt(ULTRA_MS-gameTime,false) : fmt(gameTime, mode==='sprint');
}
function updateLabels(){
  document.getElementById('modeName').textContent=MODES[mode].name;
  document.getElementById('timeLabel').textContent = mode==='ultra' ? 'Time Left' : 'Time';
  document.getElementById('linesGoal').textContent = mode==='sprint' ? ' / 40' : '';
}

// loop
function loop(t){
  rafId=requestAnimationFrame(loop);
  if(state!=='playing'){ last=0; return; }
  if(!last) last=t;
  const dt=t-last; last=t;
  gameTime+=dt; dropTimer+=dt;
  if(dropTimer>dropInterval){ softDrop(); dropTimer=0; }
  if(mode==='ultra' && gameTime>=ULTRA_MS){ gameTime=ULTRA_MS; finish('TIME UP','スコア <b>'+score.toLocaleString()+'</b> &nbsp;&middot;&nbsp; '+lines+' lines'); }
  updateTime(); draw();
}

function reset(m, sl){
  mode=m; startLevel=sl||1;
  grid=emptyGrid(); queue=[];
  cur=spawn(nextType()); nextPiece=spawn(nextType());
  holdPiece=null; canHold=true;
  score=0; lines=0; level=(mode==='practice')?startLevel:1;
  dropInterval=speedFor(level); dropTimer=0; gameTime=0; last=0;
  updateLabels(); updateHud(); updateTime(); drawNext(); drawHold();
}
function start(m, sl){
  lastMode=m; lastStartLevel=sl||1;
  reset(m, sl); state='playing'; overlay.classList.remove('show');
  if(!rafId) rafId=requestAnimationFrame(loop);
}
function finish(title, sub){ state='over'; showResult(title, sub, true); }
function gameOver(){ state='over'; showResult('GAME OVER', 'スコア <b>'+score.toLocaleString()+'</b>', mode==='normal'||mode==='ultra'); }
function togglePause(){
  if(state==='playing'){ state='paused'; showPause(); }
  else if(state==='paused'){ state='playing'; last=0; overlay.classList.remove('show'); }
}

// overlay screens
function showMenu(){
  state='ready';
  overlay.innerHTML =
    '<div class="menuTitle">Max.tetris</div>'+
    '<div class="modes">'+
      '<button data-mode="normal"><span class="mn">ノーマル</span><span class="md">エンドレスの通常プレイ</span></button>'+
      '<button data-mode="marathon"><span class="mn">マラソン</span><span class="md">レベル1→20、クリアでゴール</span></button>'+
      '<button data-mode="sprint"><span class="mn">スプリント</span><span class="md">40ラインの最速タイム</span></button>'+
      '<button data-mode="ultra"><span class="mn">ウルトラ</span><span class="md">3分間でスコア勝負</span></button>'+
      '<button data-mode="practice"><span class="mn">練習</span><span class="md">レベルを選んで開始（速度固定）</span></button>'+
    '</div>'+
    '<button class="btn ghostbtn" data-act="rankview" data-rm="normal" style="margin-top:4px;letter-spacing:.1em">&#127942; ランキング</button>';
  overlay.classList.add('show');
}
function showPractice(){
  let g=''; for(let i=1;i<=20;i++) g+='<button data-lv="'+i+'">'+i+'</button>';
  overlay.innerHTML =
    '<div class="big" style="font-size:20px;letter-spacing:.1em">レベルを選択</div>'+
    '<div class="sub">選んだレベルの速度で固定されます</div>'+
    '<div class="levelgrid">'+g+'</div>'+
    '<button class="btn ghostbtn" data-act="menu">&larr; もどる</button>';
  overlay.classList.add('show');
}
function showPause(){
  overlay.innerHTML =
    '<div class="big">PAUSED</div><div class="sub">続けますか？</div>'+
    '<div class="row"><button class="btn" data-act="resume">RESUME</button>'+
    '<button class="btn ghostbtn" data-act="menu">MENU</button></div>';
  overlay.classList.add('show');
}
const RANKMODES=['normal','marathon','sprint','ultra'];
let resultCtx=null;
function recInfo(){
  if(mode==='sprint'||mode==='marathon') return {value:gameTime, lower:true};
  return {value:score, lower:false};
}
function escapeHtml(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function showResult(title, sub, canRank){
  resultCtx = canRank ? Object.assign({mode:mode}, recInfo()) : null;
  let rankHtml='';
  if(canRank && window.rankingEnabled){
    let nm=''; try{ nm=localStorage.getItem('mt_name')||''; }catch(e){}
    rankHtml =
      '<div class="rankentry">'+
        '<input id="nameIn" class="nameinput" maxlength="12" placeholder="なまえ" value="'+escapeHtml(nm)+'">'+
        '<button class="btn" data-act="submit">登録</button>'+
      '</div>';
  } else if(canRank && !window.rankingEnabled){
    rankHtml = '<div class="sub" style="font-size:11px">※Firebaseを設定するとランキング登録できます</div>';
  }
  overlay.innerHTML =
    '<div class="big">'+title+'</div><div class="sub">'+sub+'</div>'+ rankHtml +
    '<div class="row"><button class="btn" data-act="retry">RETRY</button>'+
    '<button class="btn ghostbtn" data-act="rankview" data-rm="'+mode+'">ランキング</button>'+
    '<button class="btn ghostbtn" data-act="menu">MENU</button></div>';
  overlay.classList.add('show');
}

async function submitResult(){
  if(!resultCtx || !window.rankingEnabled) return;
  const inp=document.getElementById('nameIn');
  const name=(inp && inp.value.trim()) || 'NoName';
  try{ localStorage.setItem('mt_name', name); }catch(e){}
  const btn=document.querySelector('[data-act="submit"]');
  if(btn){ btn.textContent='送信中…'; btn.disabled=true; }
  try{ await window.submitScore(resultCtx.mode, name, resultCtx.value); showRanking(resultCtx.mode); }
  catch(e){ if(btn){ btn.textContent='失敗 再試行'; btn.disabled=false; } }
}

function showRanking(rm){
  const tabs = RANKMODES.map(m=>'<button class="ranktab" data-rt="'+m+'">'+MODES[m].name+'</button>').join('');
  overlay.innerHTML =
    '<div class="menuTitle" style="font-size:18px;letter-spacing:.12em">RANKING</div>'+
    '<div class="ranktabs">'+tabs+'</div>'+
    '<div class="ranklist" id="ranklist"><div class="sub">読み込み中…</div></div>'+
    '<button class="btn ghostbtn" data-act="menu">MENU</button>';
  overlay.classList.add('show');
  renderRankList(rm);
}
async function renderRankList(rm){
  document.querySelectorAll('[data-rt]').forEach(b=>b.classList.toggle('active', b.dataset.rt===rm));
  const el=document.getElementById('ranklist'); if(!el) return;
  if(!window.rankingEnabled){ el.innerHTML='<div class="sub">Firebase未設定です</div>'; return; }
  el.innerHTML='<div class="sub">読み込み中…</div>';
  let list=[];
  try{ list=await window.loadRanking(rm); }catch(e){ el.innerHTML='<div class="sub">読み込みに失敗しました</div>'; return; }
  if(!list.length){ el.innerHTML='<div class="sub">まだ記録がありません</div>'; return; }
  const isTime=(rm==='sprint'||rm==='marathon');
  el.innerHTML = list.map((r,i)=>
    '<div class="rankrow"><span class="rk">'+(i+1)+'</span>'+
    '<span class="rnm">'+escapeHtml(r.name||'NoName')+'</span>'+
    '<span class="rv">'+(isTime?fmt(r.value,true):Number(r.value).toLocaleString())+'</span></div>'
  ).join('');
}

overlay.addEventListener('click',e=>{
  const mb=e.target.closest('[data-mode]');
  if(mb){ const m=mb.dataset.mode; if(m==='practice') showPractice(); else start(m); return; }
  const lv=e.target.closest('[data-lv]');
  if(lv){ start('practice', +lv.dataset.lv); return; }
  const rt=e.target.closest('[data-rt]');
  if(rt){ renderRankList(rt.dataset.rt); return; }
  const actEl=e.target.closest('[data-act]');
  const act=actEl && actEl.dataset.act;
  if(act==='menu') showMenu();
  else if(act==='resume') togglePause();
  else if(act==='retry') start(lastMode, lastStartLevel);
  else if(act==='submit') submitResult();
  else if(act==='rankview') showRanking(actEl.dataset.rm||'normal');
});

document.addEventListener('keydown',e=>{
  if(e.code==='KeyP' && (state==='playing'||state==='paused')){ e.preventDefault(); togglePause(); return; }
  if(e.code==='Escape' && (state==='paused'||state==='over')){ showMenu(); return; }
  if(state!=='playing') return;
  switch(e.code){
    case'ArrowLeft': move(-1); break;
    case'ArrowRight': move(1); break;
    case'ArrowDown': softDrop(); dropTimer=0; score+=1; updateHud(); break;
    case'ArrowUp': case'KeyX': tryRotate(1); break;
    case'KeyZ': tryRotate(-1); break;
    case'KeyC': doHold(); break;
    case'Space': e.preventDefault(); hardDrop(); updateHud(); break;
    default: return;
  }
  e.preventDefault(); draw();
});

document.getElementById('touch').addEventListener('click',e=>{
  const act=e.target.dataset.act; if(!act) return;
  if(act==='pause'){ if(state==='playing'||state==='paused') togglePause(); return; }
  if(state!=='playing') return;
  if(act==='left') move(-1);
  else if(act==='right') move(1);
  else if(act==='down'){ softDrop(); dropTimer=0; score+=1; updateHud(); }
  else if(act==='rotate') tryRotate(1);
  else if(act==='drop'){ hardDrop(); updateHud(); }
  else if(act==='hold') doHold();
  draw();
});

reset('normal',1); draw(); showMenu();
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  /* ▼▼▼ ここに自分のFirebaseプロジェクトのConfigを貼り付けてください ▼▼▼
     Firebaseコンソール → プロジェクト設定 → マイアプリ（ウェブ）→ SDK設定 からコピー。
     Realtime Database を「作成」しておくこと。databaseURL が必須です。 */
  const firebaseConfig = {
    apiKey: "AIzaSyB8C8SSNeWyilKcyYR2Iy0DMI21TFRd15U",
    authDomain: "max-tetris.firebaseapp.com",
    databaseURL: "https://max-tetris-default-rtdb.firebaseio.com",
    projectId: "max-tetris",
    storageBucket: "max-tetris.firebasestorage.app",
    messagingSenderId: "437770754023",
    appId: "1:437770754023:web:5f307f801025ef12580f42",
    measurementId: "G-9KYCD78LGJ"
  };
  /* ▲▲▲ ここまで ▲▲▲ */

  window.rankingEnabled = false;
  try {
    if (!String(firebaseConfig.apiKey).startsWith('YOUR_')) {
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      window.submitScore = async (mode, name, value) => {
        await push(ref(db, 'scores/' + mode), { name: String(name).slice(0,12), value: value, ts: Date.now() });
      };
      window.loadRanking = async (mode) => {
        const snap = await get(ref(db, 'scores/' + mode));
        const arr = [];
        snap.forEach(c => { const v = c.val(); if (v && typeof v.value === 'number') arr.push(v); });
        const lower = (mode === 'sprint' || mode === 'marathon');
        arr.sort((a, b) => lower ? a.value - b.value : b.value - a.value);
        return arr.slice(0, 10);
      };
      window.rankingEnabled = true;
    }
  } catch (err) { console.error('Firebase init failed:', err); window.rankingEnabled = false; }
</script>
