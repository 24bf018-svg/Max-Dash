<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Max Dash - MaxGames</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:#0b0518; overflow:hidden; font-family:"Trebuchet MS",sans-serif; }
  #wrap { width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 50% 30%, #1d1138 0%, #0b0518 70%); }
  #stage { position:relative; width:min(100vw, 177.7vh); max-width:900px; }
  canvas { width:100%; height:auto; display:block; border-radius:10px;
    box-shadow:0 0 50px rgba(170,110,255,.3), 0 0 0 1px rgba(180,140,255,.2);
    touch-action:none; cursor:pointer; }
  #hud { position:absolute; top:10px; left:14px; right:14px; display:flex; align-items:center; gap:12px;
    pointer-events:none; color:#eadcff; font-size:clamp(11px,2.6vw,15px); font-weight:bold;
    text-shadow:0 2px 6px rgba(0,0,0,.7); }
  #bar { flex:1; height:8px; background:rgba(255,255,255,.12); border-radius:5px; overflow:hidden; }
  #barFill { height:100%; width:0%; background:linear-gradient(90deg,#ffd21e,#ffe87a); transition:width .08s linear; }
  #pct { min-width:38px; text-align:right; }
  .btn { position:absolute; pointer-events:auto; background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.2); color:#eadcff; border-radius:8px; padding:6px 10px;
    font-size:14px; cursor:pointer; }
  .btn:hover { background:rgba(255,255,255,.2); }
  #muteBtn { bottom:12px; right:12px; }
  #backBtn { bottom:12px; left:12px; display:none; }
  #resetBtn { bottom:12px; left:112px; display:none; }
</style>
</head>

    <button id="backBtn" class="btn">≡ STAGES</button>
    <button id="resetBtn" class="btn">RESET</button>
    <button id="muteBtn" class="btn">🔊</button>
  </div>
</div>

let cleared=Array(LEVELS.length).fill(false);
try{
  const v=localStorage.getItem('gd_max_cleared');
  if(v){
    const old=JSON.parse(v);
    for(let i=0;i<Math.min(old.length, cleared.length);i++) cleared[i]=!!old[i];
  }
}catch(e){}
function save(){ try{ localStorage.setItem('gd_max_cleared', JSON.stringify(cleared)); }catch(e){} }
const unlocked=(i)=> i===0 || cleared[i-1];

// ---------- STATE ----------
let state='select', stage=0, attempt=1, theme=LEVELS[0].theme, curSpeed=6.2;
let blocks=[], spikes=[], finishX=0;
let player, cameraX=0, particles=[], deadTimer=0, inputDown=false, tPrev=0, bgScroll=0;
const att=document.getElementById('att'), barFill=document.getElementById('barFill'), pct=document.getElementById('pct');
const backBtn=document.getElementById('backBtn'), resetBtn=document.getElementById('resetBtn'), muteBtn=document.getElementById('muteBtn');

function loadStage(i){ stage=i; const L=LEVELS[i]; theme=L.theme; curSpeed=L.speed; finishX=L.finishX;
  blocks=[]; spikes=[];
  for(const e of L.ents){
    if(e.t==='block'){ const left=e.x*CELL, bottom=groundY-e.y*CELL, top=bottom-e.h*CELL;
      blocks.push({left,right:left+e.w*CELL,top,bottom}); }
    else { const cx=e.x*CELL+CELL/2, base=groundY-e.y*CELL; spikes.push({cx,base,left:e.x*CELL,right:e.x*CELL+CELL}); }
  } }
function startStage(i){ attempt=1; loadStage(i); resetRun(); state='playing'; tPrev=0; backBtn.style.display='block'; resetBtn.style.display='block'; }
function resetRun(){ player={x:2*CELL,y:groundY-PS,vy:0,onGround:true,rot:0};
  cameraX=0; particles=[]; deadTimer=0; att.textContent='S'+(stage+1)+' · ATT '+attempt; barFill.style.width='0%'; pct.textContent='0%'; }

function jump(){ if(player.onGround){ player.vy=JUMP; player.onGround=false; sfxJump(); } }
function die(){ if(state!=='playing') return; state='dead'; deadTimer=34; sfxDie();
  for(let i=0;i<26;i++){ const a=Math.random()*Math.PI*2, sp=2+Math.random()*7;
    particles.push({x:player.x+PS/2,y:player.y+PS/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,s:4+Math.random()*7,life:1}); } }
function winStage(){ cleared[stage]=true; save();
  state=(stage+1<LEVELS.length)?'win':'allclear'; backBtn.style.display='block'; resetBtn.style.display='block'; }

// ---------- UPDATE ----------
function update(dt){
  if(state==='select'||state==='win'||state==='allclear') return;
  if(state==='dead'){ for(const p of particles){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=0.5*dt; p.life-=0.032*dt; }
    deadTimer-=dt; if(deadTimer<=0){ attempt++; resetRun(); state='playing'; } return; }
  player.x+=curSpeed*dt; player.vy+=GRAV*dt;
  const prevBottom=player.y+PS; player.y+=player.vy*dt; player.onGround=false;
  if(player.y+PS>=groundY){ player.y=groundY-PS; player.vy=0; player.onGround=true; }
  for(const b of blocks){ if(player.x+PS>b.left&&player.x<b.right){ if(player.y+PS>b.top&&player.y<b.bottom){
    const tol=Math.abs(player.vy*dt)+6;
    if(player.vy>=0&&prevBottom<=b.top+tol){ player.y=b.top-PS; player.vy=0; player.onGround=true; }
    else { die(); return; } } } }
  for(const s of spikes){ const hw=CELL*0.30,hh=CELL*0.62,sl=s.cx-hw,sr=s.cx+hw,sb=s.base,st=s.base-hh;
    if(player.x+PS-4>sl&&player.x+4<sr&&player.y+PS-4>st&&player.y+4<sb){ die(); return; } }
  if(!player.onGround) player.rot+=0.165*dt; else player.rot=Math.round(player.rot/(Math.PI/2))*(Math.PI/2);
  if(inputDown&&player.onGround) jump();
  cameraX=player.x-160; bgScroll=cameraX;
  if(player.x>=finishX){ winStage(); return; }
  const p=Math.min(100,Math.max(0,(player.x/finishX)*100)); barFill.style.width=p+'%'; pct.textContent=Math.floor(p)+'%';
}

// ---------- DRAW HELPERS ----------
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function drawBricks(scroll){
  const tw=156,th=124, off=(scroll*0.3)%tw, rgb=theme.brickRGB || '200,140,255';
  ctx.lineWidth=2;
  for(let row=-1; row*th<H+th; row++) for(let col=-1; col*tw<W+tw; col++){
    const x=col*tw-off, y=row*th-30;
    const hsh=((col*73856093)^(row*19349663))>>>0, a=(0.05+(hsh%100)/100*0.09).toFixed(3);
    ctx.fillStyle='rgba('+rgb+','+a+')'; rr(x+5,y+5,tw-10,th-10,10); ctx.fill();
    ctx.strokeStyle='rgba('+rgb+',0.22)'; rr(x+5,y+5,tw-10,th-10,10); ctx.stroke();
  }
}
function pine(bx,by,s){ ctx.beginPath();
  ctx.moveTo(bx,by-s*1.7); ctx.lineTo(bx-s*0.75,by-s*0.6); ctx.lineTo(bx+s*0.75,by-s*0.6); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(bx,by-s*1.1); ctx.lineTo(bx-s,by); ctx.lineTo(bx+s,by); ctx.closePath(); ctx.fill();
  ctx.fillRect(bx-1.5,by,3,4); }

function drawCubeAt(cx,cy,sz,rot){
  const k=sz/36, s2=sz/2, R=5*k; ctx.save(); ctx.translate(cx,cy); ctx.rotate(rot); ctx.lineJoin='round';
  const bodyG=ctx.createLinearGradient(0,-s2,0,s2);
  bodyG.addColorStop(0,'#ffd31f'); bodyG.addColorStop(.45,'#ffb01c'); bodyG.addColorStop(1,'#ff7e10');
  rr(-s2,-s2,sz,sz,R); ctx.fillStyle=bodyG; ctx.fill();
  const borderG=ctx.createLinearGradient(0,-s2,0,s2);
  borderG.addColorStop(0,'#82eaff'); borderG.addColorStop(.5,'#33c6f7'); borderG.addColorStop(1,'#1aa6e6');
  rr(-s2,-s2,sz,sz,R); ctx.lineWidth=4*k; ctx.strokeStyle=borderG; ctx.stroke();
  const faceG=ctx.createLinearGradient(0,-12*k,0,12*k);
  faceG.addColorStop(0,'#7ae8ff'); faceG.addColorStop(1,'#27c2f4');
  ctx.fillStyle=faceG; ctx.strokeStyle='#1592c6'; ctx.lineWidth=1.2*k;
  rr(-12*k,-10*k,9*k,9*k,1.5*k); ctx.fill(); ctx.stroke();
  rr(3*k,-10*k,9*k,9*k,1.5*k); ctx.fill(); ctx.stroke();
  rr(-12*k,3*k,24*k,8*k,2*k); ctx.fill(); ctx.stroke();
  ctx.restore();
}

function drawPlayerAt(cx,cy,sz,rot){
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(rot);
  if(playerImg.complete && playerImg.naturalWidth>0){
    const oldSmooth=ctx.imageSmoothingEnabled;
    ctx.imageSmoothingEnabled=true;
    ctx.drawImage(playerImg,-sz/2,-sz/2,sz,sz);
    ctx.imageSmoothingEnabled=oldSmooth;
  } else {
    drawCubeAt(0,0,sz,0);
  }
  ctx.restore();
}

// ---------- DRAW ----------
function cardRect(i){
  const cols=5, cw=140, ch=112, gapX=14, gapY=14;
  const totalW=cols*cw+(cols-1)*gapX;
  const sx=(W-totalW)/2;
  const row=Math.floor(i/cols), col=i%cols;
  return {x:sx+col*(cw+gapX), y:155+row*(ch+gapY), w:cw, h:ch};
}

function draw(){
  const t=(state==='select')?{bgTop:'#5a18a0',bgBot:'#220646',brickRGB:'200,140,255'}:theme;
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,t.bgTop); g.addColorStop(.65,t.bgBot); g.addColorStop(1,'#0b0518');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  theme.brickRGB=t.brickRGB;
  drawBricks(state==='select'?0:bgScroll);

  if(state==='select'){ drawSelect(); return; }

  ctx.save(); ctx.translate(-cameraX,0);
  for(const b of blocks){ if(b.right-cameraX<-20||b.left-cameraX>W+20) continue;
    ctx.fillStyle=theme.floorFill; rr(b.left,b.top,b.right-b.left,b.bottom-b.top,3); ctx.fill();
    ctx.lineWidth=3; ctx.strokeStyle=theme.edge; ctx.shadowColor=theme.glow; ctx.shadowBlur=12;
    rr(b.left+1.5,b.top+1.5,b.right-b.left-3,b.bottom-b.top-3,3); ctx.stroke(); ctx.shadowBlur=0;
    ctx.strokeStyle='rgba('+theme.brickRGB+',0.30)'; ctx.lineWidth=1;
    for(let xx=b.left+CELL;xx<b.right;xx+=CELL){ ctx.beginPath(); ctx.moveTo(xx,b.top); ctx.lineTo(xx,b.bottom); ctx.stroke(); }
    for(let yy=b.top+CELL;yy<b.bottom;yy+=CELL){ ctx.beginPath(); ctx.moveTo(b.left,yy); ctx.lineTo(b.right,yy); ctx.stroke(); } }
  for(const s of spikes){ if(s.right-cameraX<-20||s.left-cameraX>W+20) continue;
    ctx.beginPath(); ctx.moveTo(s.cx-CELL/2,s.base); ctx.lineTo(s.cx,s.base-CELL); ctx.lineTo(s.cx+CELL/2,s.base); ctx.closePath();
    ctx.fillStyle=theme.spikeFill; ctx.fill();
    ctx.lineWidth=2.5; ctx.strokeStyle=theme.edge; ctx.shadowColor=theme.glow; ctx.shadowBlur=12; ctx.stroke(); ctx.shadowBlur=0; }
  if(finishX-cameraX<W+40){ for(let i=0;i<10;i++){ ctx.fillStyle=(i%2===0)?'#fff':'#222'; ctx.fillRect(finishX,groundY-200+i*20,14,20);
    ctx.fillStyle=(i%2===0)?'#222':'#fff'; ctx.fillRect(finishX+14,groundY-200+i*20,14,20); } }
  drawPlayerAt(player.x+PS/2, player.y+PS/2, PS, player.rot);
  for(const p of particles){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle='#ffb01e'; ctx.fillRect(p.x-p.s/2,p.y-p.s/2,p.s,p.s); }
  ctx.globalAlpha=1; ctx.restore();

  const gg=ctx.createLinearGradient(0,groundY,0,lowerY); gg.addColorStop(0,theme.floorFill); gg.addColorStop(1,'#0b0518');
  ctx.fillStyle=gg; ctx.fillRect(0,groundY,W,lowerY-groundY);
  ctx.strokeStyle='rgba('+theme.brickRGB+',0.28)'; ctx.lineWidth=1;
  const off=bgScroll%CELL; for(let x=-off;x<W;x+=CELL){ ctx.beginPath(); ctx.moveTo(x,groundY); ctx.lineTo(x,lowerY); ctx.stroke(); }
  ctx.beginPath(); ctx.moveTo(0,groundY+CELL*0.7); ctx.lineTo(W,groundY+CELL*0.7); ctx.stroke();
  ctx.fillStyle=theme.edge; ctx.shadowColor=theme.glow; ctx.shadowBlur=16; ctx.fillRect(0,groundY-2,W,4); ctx.shadowBlur=0;
  ctx.fillStyle=theme.lower; ctx.fillRect(0,lowerY,W,H-lowerY);
  ctx.fillStyle=theme.spikeFill; const toff=(bgScroll*0.6)%240;
  for(let x=-240;x<W+240;x+=240){ pine(x-toff+50,lowerY+4,11); pine(x-toff+150,lowerY+6,8); }

      if(state==='win') overlay('STAGE CLEAR!', 'Tap to next stage -> '+LEVELS[stage+1].name, '#ffd21e');
      else if(state==='allclear') overlay('ALL CLEAR!', 'All stages completed! Tap to stage select', '#6fffa0');
}

function drawSelect(){
  ctx.textAlign='center';
  ctx.fillStyle='#f3e7ff'; ctx.shadowColor='#c98bff'; ctx.shadowBlur=22;
  ctx.font='bold 44px Trebuchet MS'; ctx.fillText('MAX DASH', W/2, 72); ctx.shadowBlur=0;
      ctx.fillStyle='#c4a8ee'; ctx.font='bold 15px Trebuchet MS'; ctx.fillText('MaxGames - Select Stage', W/2, 103);
  ctx.font='bold 12px Trebuchet MS'; ctx.fillStyle='#d8c8f5';
  ctx.fillText('SPACE / ENTER / ↑ / CLICK / TAP = JUMP', W/2, 126);

  for(let i=0;i<LEVELS.length;i++){
    const r=cardRect(i), th=LEVELS[i].theme, open=unlocked(i), done=cleared[i];
    ctx.fillStyle=open?'rgba(255,255,255,.06)':'rgba(255,255,255,.025)'; rr(r.x,r.y,r.w,r.h,12); ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle=open?th.glow:'rgba(255,255,255,.15)';
    if(open){ ctx.shadowColor=th.glow; ctx.shadowBlur=12; } rr(r.x,r.y,r.w,r.h,12); ctx.stroke(); ctx.shadowBlur=0;
    ctx.globalAlpha=open?1:0.3; drawPlayerAt(r.x+r.w/2, r.y+32, 30, 0); ctx.globalAlpha=1;
    ctx.fillStyle=open?'#f3e7ff':'#776a88'; ctx.font='bold 14px Trebuchet MS'; ctx.fillText('STAGE '+(i+1), r.x+r.w/2, r.y+63);
    ctx.font='bold 10px Trebuchet MS'; ctx.fillStyle=open?th.glow:'#665'; ctx.fillText(LEVELS[i].name, r.x+r.w/2, r.y+82);
    ctx.font='bold 13px Trebuchet MS'; ctx.fillStyle=open?'#f3e7ff':'#776a88';
    ctx.fillText(done?'✓ CLEAR':(open?'▶ PLAY':'🔒 LOCKED'), r.x+r.w/2, r.y+102);
  }
  ctx.textAlign='left';
}

function overlay(title,sub,color){ ctx.fillStyle='rgba(11,5,24,.55)'; ctx.fillRect(0,0,W,H); ctx.textAlign='center';
  ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=24; ctx.font='bold 56px Trebuchet MS'; ctx.fillText(title,W/2,H/2-6); ctx.shadowBlur=0;
  ctx.fillStyle='#eadcff'; ctx.font='bold 19px Trebuchet MS'; ctx.fillText(sub,W/2,H/2+38); ctx.textAlign='left'; }

// ---------- LOOP ----------
function loop(now){ if(!tPrev) tPrev=now; let dt=(now-tPrev)/16.667; tPrev=now; if(dt>2.5)dt=2.5; update(dt); draw(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);

// ---------- INPUT ----------
function pos(e){ const r=cv.getBoundingClientRect(); const s=e.changedTouches?e.changedTouches[0]:e;
  return {x:(s.clientX-r.left)*W/r.width, y:(s.clientY-r.top)*H/r.height}; }
function firstPlayable(){ for(let i=0;i<LEVELS.length;i++){ if(unlocked(i)&&!cleared[i]) return i; } return 0; }
function handle(p){ initAudio();
  if(state==='select'){ let target=-1;
    if(p){ for(let i=0;i<LEVELS.length;i++){ const r=cardRect(i);
      if(p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h&&unlocked(i)) target=i; } } else target=firstPlayable();
    if(target>=0) startStage(target); return; }
  if(state==='win'){ startStage(stage+1); return; }
  if(state==='allclear'){ toSelect(); return; }
  if(state==='playing'){ inputDown=true; jump(); }
}
function toSelect(){ state='select'; backBtn.style.display='none'; resetBtn.style.display='none'; att.textContent='SELECT STAGE'; barFill.style.width='0%'; pct.textContent='0%'; }
cv.addEventListener('mousedown', e=>{ e.preventDefault(); handle(pos(e)); });
window.addEventListener('mouseup', ()=>{ inputDown=false; });
cv.addEventListener('touchstart', e=>{ e.preventDefault(); handle(pos(e)); }, {passive:false});
window.addEventListener('touchend', e=>{ e.preventDefault(); inputDown=false; }, {passive:false});
window.addEventListener('keydown', e=>{ if(e.code==='Space'||e.code==='Enter'||e.code==='ArrowUp'||e.code==='KeyW'){ e.preventDefault(); handle(null); } if(e.code==='Escape') toSelect(); });
window.addEventListener('keyup', e=>{ if(e.code==='Space'||e.code==='Enter'||e.code==='ArrowUp'||e.code==='KeyW') inputDown=false; });
backBtn.addEventListener('click', toSelect);
resetBtn.addEventListener('click', ()=>{ if(state==='playing'||state==='dead'){ attempt++; resetRun(); state='playing'; } });

// ---------- AUDIO ----------
let actx=null,musicGain=null,muted=false,next=0,step=0;
function initAudio(){ if(actx) return; actx=new (window.AudioContext||window.webkitAudioContext)();
  musicGain=actx.createGain(); musicGain.gain.value=muted?0:0.18; musicGain.connect(actx.destination); next=actx.currentTime+0.1; step=0; scheduler(); }
const bassSeq=[0,3,5,7,0,7,5,3];
function noteAt(time){ const spb=60/140/2;
  if(step%2===0){ const o=actx.createOscillator(),g=actx.createGain();
    o.frequency.setValueAtTime(150,time); o.frequency.exponentialRampToValueAtTime(50,time+0.12);
    g.gain.setValueAtTime(0.9,time); g.gain.exponentialRampToValueAtTime(0.001,time+0.14);
    o.connect(g); g.connect(musicGain); o.start(time); o.stop(time+0.15); }
  const f=65.4*Math.pow(2,bassSeq[step%8]/12); const o2=actx.createOscillator(),g2=actx.createGain();
  o2.type='sawtooth'; o2.frequency.value=f; g2.gain.setValueAtTime(0.0001,time);
  g2.gain.linearRampToValueAtTime(0.5,time+0.02); g2.gain.exponentialRampToValueAtTime(0.001,time+spb*0.9);
  o2.connect(g2); g2.connect(musicGain); o2.start(time); o2.stop(time+spb);
  if(step%2===1){ const b=actx.createBuffer(1,800,actx.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<800;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/800,3);
    const src=actx.createBufferSource(),hg=actx.createGain(); src.buffer=b; hg.gain.value=0.15; src.connect(hg); hg.connect(musicGain); src.start(time); }
  step++; }
function scheduler(){ if(!actx) return; const spb=60/140/2; while(next<actx.currentTime+0.2){ noteAt(next); next+=spb; } setTimeout(scheduler,50); }
function sfxJump(){ if(!actx||muted) return; const o=actx.createOscillator(),g=actx.createGain();
  o.frequency.setValueAtTime(600,actx.currentTime); o.frequency.exponentialRampToValueAtTime(1100,actx.currentTime+0.08);
  g.gain.setValueAtTime(0.12,actx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.1);
  o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime+0.1); }
function sfxDie(){ if(!actx||muted) return; const o=actx.createOscillator(),g=actx.createGain();
  o.type='square'; o.frequency.setValueAtTime(180,actx.currentTime); o.frequency.exponentialRampToValueAtTime(40,actx.currentTime+0.3);
  g.gain.setValueAtTime(0.25,actx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.35);
  o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime+0.35); }
muteBtn.addEventListener('click', ()=>{ muted=!muted; muteBtn.textContent=muted?'🔇':'🔊'; if(musicGain) musicGain.gain.value=muted?0:0.18; });
</script>
</body>
</html>
